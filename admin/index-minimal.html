<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Manager</title>
</head>
<body>
    <!-- Decap CMS will mount here -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
        CMS.init({
            config: {
                backend: {
                    name: 'github',
                    repo: 'krnch/piuwebsite',
                    branch: 'main',
                    base_url: 'https://red-plant-033de6c1e.2.azurestaticapps.net',
                    auth_endpoint: '/.auth/login/github'
                },
                media_folder: 'images/blog',
                public_folder: '/images/blog',
                collections: [
                    {
                        name: 'posts',
                        label: 'Blog Posts',
                        folder: 'blog',
                        create: true,
                        slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
                        extension: 'html',
                        format: 'frontmatter',
                        fields: [
                            {label: 'Title', name: 'title', widget: 'string'},
                            {label: 'Date', name: 'date', widget: 'datetime'},
                            {label: 'Content', name: 'body', widget: 'markdown'}
                        ]
                    },
                    {
                        name: 'homepage',
                        label: 'Homepage',
                        files: [
                            {
                                label: 'Homepage Content',
                                name: 'homepage',
                                file: '_data/homepage.yml',
                                fields: [
                                    {label: 'Hero Title', name: 'hero_title', widget: 'string'},
                                    {label: 'Hero Subtitle', name: 'hero_subtitle', widget: 'text'},
                                    {label: 'About Section', name: 'about', widget: 'markdown'}
                                ]
                            }
                        ]
                    },
                    {
                        name: 'resume',
                        label: 'Resume',
                        files: [
                            {
                                label: 'Resume Data',
                                name: 'resume',
                                file: '_data/resume.yml',
                                fields: [
                                    {label: 'Professional Summary', name: 'summary', widget: 'text'},
                                    {
                                        label: 'Experience',
                                        name: 'experience',
                                        widget: 'list',
                                        fields: [
                                            {label: 'Company', name: 'company', widget: 'string'},
                                            {label: 'Position', name: 'position', widget: 'string'},
                                            {label: 'Duration', name: 'duration', widget: 'string'},
                                            {label: 'Description', name: 'description', widget: 'text'}
                                        ]
                                    }
                                ]
                            }
                        ]
                    }
                ]
            }
        });
    </script>
</body>
</html>

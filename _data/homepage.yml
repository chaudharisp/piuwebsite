about_content: |
  ## About Me
  
  I'm a senior product manager with a passion for building products that users love and businesses value. With over 8 years of experience in product strategy, data analytics, and cross-functional leadership, I've helped launch and scale products that have reached millions of users.

  My approach combines rigorous data analysis with user empathy to create product strategies that drive growth and deliver exceptional user experiences. I believe in the power of cross-functional collaboration and have led teams through complex product launches, pivots, and scaling challenges.

  ### Key Achievements
  - Led product strategy for 3 major product launches with 95%+ user satisfaction
  - Increased user engagement by 40% through data-driven feature optimization
  - Managed cross-functional teams of 15+ engineers, designers, and analysts
  - Developed product roadmaps that generated $10M+ in revenue growth


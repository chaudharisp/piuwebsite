hero_title: "Business Analyst & Data Specialist"
hero_subtitle: "Bridging the gap between data and decisions in FinTech and eCommerce"
about_content: |
  I'm a Business Analyst with 4+ years of experience bridging the gap between data and decisions — helping teams in FinTech and eCommerce build smarter, faster, and more aligned products. Whether I'm writing a BRD from scratch, digging into SQL to uncover a reporting gap, or facilitating a cross-functional sprint review, I bring a structured mindset and a bias toward outcomes.

  My work sits at the intersection of product, data, and process. I specialize in translating ambiguous business needs into clear technical requirements, and in turning raw data into dashboards and insights stakeholders can actually act on. I care about accuracy, traceability, and building processes that don't fall apart at scale.

